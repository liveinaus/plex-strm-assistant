name: Publish Docker image

on:
  push:
    branches:
      - main
    paths:
      - package.json

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version
        run: |
          PREV=$(git show HEAD^:package.json | jq -r '.version' 2>/dev/null || echo "none")
          CURR=$(jq -r '.version' package.json)
          echo "previous=$PREV, current=$CURR"
          if [ "$PREV" = "$CURR" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "value=$CURR" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.version.outputs.changed == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.version.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.version.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.version.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/plex-strm-assistant:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/plex-strm-assistant:${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
